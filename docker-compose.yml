version: '3.9'

# ============================================================
# SaasLocal — Docker Compose
# Uso desarrollo: docker-compose up --build
# Uso producción: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ── Base de datos PostgreSQL ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: saaslocal_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-saaslocal}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Scripts SQL ejecutados automáticamente al crear el contenedor
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-saaslocal}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saaslocal_net

  # ── Backend Node.js ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saaslocal_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:    ${NODE_ENV:-production}
      PORT:        4000
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-saaslocal}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      JWT_SECRET:  ${JWT_SECRET:?JWT_SECRET es requerido}
      JWT_EXPIRES: ${JWT_EXPIRES:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL:   ${LOG_LEVEL:-info}
    volumes:
      - backend_logs:/app/logs
    ports:
      - "4000:4000"
    networks:
      - saaslocal_net

  # ── Frontend React (Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: saaslocal_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - saaslocal_net

# ── Volúmenes persistentes ─────────────────────────────────
volumes:
  postgres_data:
    name: saaslocal_postgres_data
  backend_logs:
    name: saaslocal_backend_logs

# ── Red interna ────────────────────────────────────────────
networks:
  saaslocal_net:
    name: saaslocal_network
    driver: bridge
